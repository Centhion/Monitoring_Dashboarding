# =============================================================================
# Grafana Notification Provisioning -- Generated by deploy_configure.py
# =============================================================================
# Sites configured: ent, dv
# =============================================================================

apiVersion: 1
contactPoints:
- orgId: 1
  name: Microsoft Teams
  receivers:
  - uid: teams-webhook
    type: teams
    settings:
      url: ${TEAMS_WEBHOOK_URL}
      title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
      sectiontitle: '{{ .CommonLabels.hostname }} ({{ .CommonLabels.environment }})'
      text: '{{ .CommonAnnotations.summary }}'
    disableResolveMessage: false
- orgId: 1
  name: Email Fallback
  receivers:
  - uid: email-fallback
    type: email
    settings:
      addresses: ${ALERT_EMAIL_TO:-ops-team@example.com}
      singleEmail: true
    disableResolveMessage: false
- orgId: 1
  name: ENT Email
  receivers:
  - uid: email-ent
    type: email
    settings:
      addresses: ${SITE_ENT_EMAIL:-ent-ops@example.com}
      singleEmail: true
    disableResolveMessage: false
- orgId: 1
  name: DV Email
  receivers:
  - uid: email-dv
    type: email
    settings:
      addresses: ${SITE_DV_EMAIL:-dv-ops@example.com}
      singleEmail: true
    disableResolveMessage: false
policies:
- orgId: 1
  receiver: Microsoft Teams
  group_by:
  - alertname
  - hostname
  - datacenter
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
  - receiver: Email Fallback
    matchers:
    - severity = critical
    continue: true
    group_wait: 15s
    repeat_interval: 1h
    routes:
    - receiver: ENT Email
      matchers:
      - datacenter = ent
      continue: true
    - receiver: DV Email
      matchers:
      - datacenter = dv
      continue: true
  - receiver: Microsoft Teams
    matchers:
    - severity = warning
    continue: false
    repeat_interval: 4h
    routes:
    - receiver: ENT Email
      matchers:
      - datacenter = ent
      continue: true
    - receiver: DV Email
      matchers:
      - datacenter = dv
      continue: true
  - receiver: Microsoft Teams
    matchers:
    - severity = info
    continue: false
    repeat_interval: 12h
muteTimes: []
