# =============================================================================
# Grafana Dashboard Provisioning
# =============================================================================
# Loads dashboard JSON files from provisioned directories at startup.
#
# Folder structure:
#   Enterprise     -- Fleet-wide views (NOC, SLA, Audit, Probing)
#   Servers        -- VM dashboards by OS and role (Windows, Linux, IIS, SQL, DC, etc.)
#   Infrastructure -- Physical layer (Site Overview, Network, Physical Servers, Certificates)
# =============================================================================

apiVersion: 1

providers:
  # ---------------------------------------------------------------------------
  # Enterprise -- Fleet-wide dashboards across all sites
  # ---------------------------------------------------------------------------
  - name: "Enterprise"
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards/enterprise
      foldersFromFilesStructure: false
    folder: "Enterprise"

  # ---------------------------------------------------------------------------
  # Servers -- VM dashboards organized by OS and server role
  # ---------------------------------------------------------------------------
  - name: "Servers"
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards/servers
      foldersFromFilesStructure: false
    folder: "Servers"

  # ---------------------------------------------------------------------------
  # Infrastructure -- Physical layer, network, and site-level views
  # ---------------------------------------------------------------------------
  - name: "Infrastructure"
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards/infrastructure
      foldersFromFilesStructure: false
    folder: "Infrastructure"

