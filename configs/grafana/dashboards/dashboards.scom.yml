# =============================================================================
# Grafana Dashboard Provisioning -- SCOM Only
# =============================================================================
# Used by the SCOM-only deployment (docker-compose.scom.yml).
# Loads only the SCOM Monitoring dashboards.
# =============================================================================

apiVersion: 1

providers:
  - name: "SCOM"
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards/scom
      foldersFromFilesStructure: false
    folder: "SCOM Monitoring"
