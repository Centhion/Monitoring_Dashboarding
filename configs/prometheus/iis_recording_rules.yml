# =============================================================================
# IIS Recording Rules
# =============================================================================
# Pre-computed aggregations for IIS web server metrics. These rules improve
# dashboard performance by pre-calculating request rates, error ratios,
# and connection metrics that would otherwise require expensive instant queries.
#
# Source metrics come from Alloy's windows_exporter IIS collector
# (configured in configs/alloy/windows/role_iis.alloy).
#
# Metric naming convention:
#   iis:<scope>_<metric>:<aggregation>
# =============================================================================

groups:
  # ---------------------------------------------------------------------------
  # Per-Site IIS Metrics (per server, per IIS site)
  # ---------------------------------------------------------------------------
  - name: iis_site_recording_rules
    interval: 30s
    rules:
      - record: iis:site_requests:rate5m
        expr: |
          sum by (instance, hostname, datacenter, environment, role, site_name) (
            rate(windows_iis_requests_total[5m])
          )

      - record: iis:site_5xx_errors:rate5m
        expr: |
          sum by (instance, hostname, datacenter, environment, role, site_name) (
            rate(windows_iis_requests_total{status_code=~"5.."}[5m])
          )

      - record: iis:site_error_ratio:5m
        expr: |
          iis:site_5xx_errors:rate5m
          / on (instance, hostname, datacenter, environment, role, site_name)
          (iis:site_requests:rate5m > 0)

      - record: iis:site_4xx_errors:rate5m
        expr: |
          sum by (instance, hostname, datacenter, environment, role, site_name) (
            rate(windows_iis_requests_total{status_code=~"4.."}[5m])
          )

      - record: iis:site_current_connections:current
        expr: |
          sum by (instance, hostname, datacenter, environment, role, site_name) (
            windows_iis_current_connections
          )

      - record: iis:site_bytes_sent:rate5m
        expr: |
          sum by (instance, hostname, datacenter, environment, role, site_name) (
            rate(windows_iis_sent_bytes_total[5m])
          )

      - record: iis:site_bytes_received:rate5m
        expr: |
          sum by (instance, hostname, datacenter, environment, role, site_name) (
            rate(windows_iis_received_bytes_total[5m])
          )

  # ---------------------------------------------------------------------------
  # Per-Datacenter IIS Aggregations
  # Site-level roll-ups for the Enterprise NOC and Site Overview dashboards.
  # ---------------------------------------------------------------------------
  - name: iis_datacenter_recording_rules
    interval: 30s
    rules:
      - record: iis:datacenter_requests:rate5m
        expr: |
          sum by (datacenter, environment) (
            iis:site_requests:rate5m
          )

      - record: iis:datacenter_5xx_errors:rate5m
        expr: |
          sum by (datacenter, environment) (
            iis:site_5xx_errors:rate5m
          )

      - record: iis:datacenter_error_ratio:5m
        expr: |
          iis:datacenter_5xx_errors:rate5m
          / on (datacenter, environment)
          (iis:datacenter_requests:rate5m > 0)

      - record: iis:datacenter_connections:sum
        expr: |
          sum by (datacenter, environment) (
            iis:site_current_connections:current
          )
