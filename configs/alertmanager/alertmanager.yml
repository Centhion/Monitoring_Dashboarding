# =============================================================================
# Alertmanager Configuration -- Generated by deploy_configure.py
# =============================================================================
# Re-run the wrapper to regenerate after adding sites.
# Sites configured: ent, dv
# =============================================================================

global:
  resolve_timeout: 5m
  smtp_smarthost: smtp.example.com:587
  smtp_from: monitoring@example.com
  smtp_require_tls: true
  smtp_auth_username: monitoring@example.com
  smtp_auth_password: changeme
templates:
- /etc/alertmanager/templates/*.tmpl
route:
  receiver: teams_default
  group_by:
  - alertname
  - hostname
  - datacenter
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
  - match:
      severity: critical
    group_wait: 15s
    repeat_interval: 1h
    routes:
    - match:
        datacenter: ent
      receiver: ent_critical
      continue: false
    - match:
        datacenter: dv
      receiver: dv_critical
      continue: false
    - receiver: teams_and_email
    continue: false
  - match:
      severity: warning
    repeat_interval: 4h
    routes:
    - match:
        datacenter: ent
      receiver: ent_warning
      continue: false
    - match:
        datacenter: dv
      receiver: dv_warning
      continue: false
    - receiver: teams_default
    continue: false
  - match:
      severity: info
    receiver: teams_info
    repeat_interval: 12h
    continue: false
inhibit_rules:
- source_matchers:
  - alertname =~ "WindowsServerDown|LinuxServerDown"
  target_matchers:
  - severity =~ "warning|info"
  equal:
  - hostname
- source_matchers:
  - alertname = "PrometheusNotificationsFailing"
  target_matchers:
  - alertname =~ "Fleet.*"
- source_matchers:
  - alertname = "SiteMajorOutage"
  target_matchers:
  - severity =~ "critical|warning"
  - outage_scope != "site"
  equal:
  - datacenter
- source_matchers:
  - alertname = "SitePartialOutage"
  target_matchers:
  - severity = "warning"
  - outage_scope != "site"
  equal:
  - datacenter
- source_matchers:
  - alertname = "RolePartialOutage"
  target_matchers:
  - severity = "warning"
  - outage_scope != "role"
  equal:
  - datacenter
  - role
receivers:
- name: teams_default
  webhook_configs:
  - url: https://example.com/webhook/placeholder
    send_resolved: true
- name: teams_and_email
  webhook_configs:
  - url: https://example.com/webhook/placeholder
    send_resolved: true
  email_configs:
  - to: ops-team@example.com
    send_resolved: true
    headers:
      Subject: '[CRITICAL] {{ .GroupLabels.alertname }} on {{ .GroupLabels.hostname }}'
- name: teams_info
  webhook_configs:
  - url: https://example.com/webhook/placeholder
    send_resolved: false
- name: ent_critical
  webhook_configs:
  - url: https://example.com/webhook/placeholder
    send_resolved: true
  email_configs:
  - to: ent-ops@example.com
    send_resolved: true
    headers:
      Subject: '[CRITICAL] [ent] {{ .GroupLabels.alertname }} on {{ .GroupLabels.hostname }}'
- name: ent_warning
  webhook_configs:
  - url: https://example.com/webhook/placeholder
    send_resolved: true
  email_configs:
  - to: ent-ops@example.com
    send_resolved: true
    headers:
      Subject: '[WARNING] [ent] {{ .GroupLabels.alertname }} on {{ .GroupLabels.hostname }}'
- name: dv_critical
  webhook_configs:
  - url: https://example.com/webhook/placeholder
    send_resolved: true
  email_configs:
  - to: dv-ops@example.com
    send_resolved: true
    headers:
      Subject: '[CRITICAL] [dv] {{ .GroupLabels.alertname }} on {{ .GroupLabels.hostname }}'
- name: dv_warning
  webhook_configs:
  - url: https://example.com/webhook/placeholder
    send_resolved: true
  email_configs:
  - to: dv-ops@example.com
    send_resolved: true
    headers:
      Subject: '[WARNING] [dv] {{ .GroupLabels.alertname }} on {{ .GroupLabels.hostname }}'
