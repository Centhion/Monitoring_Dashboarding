# =============================================================================
# Alertmanager Configuration -- Generated by deploy_configure.py
# =============================================================================
# Re-run the wrapper to regenerate after adding sites.
# Sites configured: dv, ent, sbt, sno, sol, schw, mm
# =============================================================================

global:
  resolve_timeout: 5m
  smtp_smarthost: smtp.example.com:587
  smtp_from: monitoring@example.com
  smtp_require_tls: true
  smtp_auth_username: monitoring@example.com
  smtp_auth_password: changeme
templates:
- /etc/alertmanager/templates/*.tmpl
route:
  receiver: teams_default
  group_by:
  - alertname
  - datacenter
  group_wait: 60s
  group_interval: 5m
  repeat_interval: 4h
  routes:
  - match:
      severity: critical
    group_wait: 15s
    repeat_interval: 1h
    routes:
    - match:
        datacenter: dv
      receiver: dv_critical
      continue: false
    - match:
        datacenter: ent
      receiver: ent_critical
      continue: false
    - match:
        datacenter: sbt
      receiver: sbt_critical
      continue: false
    - match:
        datacenter: sno
      receiver: sno_critical
      continue: false
    - match:
        datacenter: sol
      receiver: sol_critical
      continue: false
    - match:
        datacenter: schw
      receiver: schw_critical
      continue: false
    - match:
        datacenter: mm
      receiver: mm_critical
      continue: false
    - receiver: teams_and_email
    continue: false
  - match:
      severity: warning
    group_wait: 60s
    repeat_interval: 4h
    routes:
    - match:
        datacenter: dv
      receiver: dv_warning
      continue: false
    - match:
        datacenter: ent
      receiver: ent_warning
      continue: false
    - match:
        datacenter: sbt
      receiver: sbt_warning
      continue: false
    - match:
        datacenter: sno
      receiver: sno_warning
      continue: false
    - match:
        datacenter: sol
      receiver: sol_warning
      continue: false
    - match:
        datacenter: schw
      receiver: schw_warning
      continue: false
    - match:
        datacenter: mm
      receiver: mm_warning
      continue: false
    - receiver: teams_default
    continue: false
  - match:
      severity: info
    receiver: teams_info
    repeat_interval: 12h
    continue: false
inhibit_rules:
- source_matchers:
  - alertname =~ "WindowsServerDown|LinuxServerDown"
  target_matchers:
  - severity =~ "warning|info"
  equal:
  - hostname
- source_matchers:
  - alertname = "PrometheusNotificationsFailing"
  target_matchers:
  - alertname =~ "Fleet.*"
# Critical severity suppresses warning for the same metric category on the same host.
# Prevents duplicate notifications when a warning escalates to critical
# (e.g., WindowsCpuHighCritical fires, suppress WindowsCpuHighWarning on same host).
- source_matchers:
  - severity = "critical"
  target_matchers:
  - severity = "warning"
  equal:
  - hostname
  - datacenter
- source_matchers:
  - alertname = "SiteMajorOutage"
  target_matchers:
  - severity =~ "critical|warning"
  - outage_scope != "site"
  equal:
  - datacenter
- source_matchers:
  - alertname = "SitePartialOutage"
  target_matchers:
  - severity = "warning"
  - outage_scope != "site"
  equal:
  - datacenter
- source_matchers:
  - alertname = "RolePartialOutage"
  target_matchers:
  - severity = "warning"
  - outage_scope != "role"
  equal:
  - datacenter
  - role
receivers:
- name: teams_default
  webhook_configs:
  - url: https://example.com/webhook/placeholder
    send_resolved: true
- name: teams_and_email
  webhook_configs:
  - url: https://example.com/webhook/placeholder
    send_resolved: true
  email_configs:
  - to: ops-team@example.com
    send_resolved: true
    headers:
      Subject: '[CRITICAL] {{ .GroupLabels.alertname }} in {{ .GroupLabels.datacenter }} ({{ .Alerts | len }} host(s))'
- name: teams_info
  webhook_configs:
  - url: https://example.com/webhook/placeholder
    send_resolved: false
- name: dv_critical
  webhook_configs:
  - url: https://example.com/webhook/placeholder
    send_resolved: true
  email_configs:
  - to: dv-ops@example.com
    send_resolved: true
    headers:
      Subject: '[CRITICAL] [dv] {{ .GroupLabels.alertname }} in {{ .GroupLabels.datacenter }} ({{ .Alerts | len }} host(s))'
- name: dv_warning
