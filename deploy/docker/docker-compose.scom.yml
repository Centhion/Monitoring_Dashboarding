# =============================================================================
# SCOM-Only Deployment -- Grafana + SCOM Data Warehouse
# =============================================================================
# Minimal deployment for Phase 1: Replace SquaredUp with Grafana dashboards
# reading from the existing SCOM Data Warehouse. No new agents, no Prometheus,
# no Loki. Just Grafana connecting to the production SQL Server.
#
# Usage:
#   Production:
#     docker compose -f docker-compose.scom.yml up -d
#
#   With simulator (demo/dev):
#     docker compose -f docker-compose.scom.yml --profile scom-demo up -d
#
# Configuration:
#   Copy .env.scom.example to .env and set your SCOM DW connection details.
# =============================================================================

networks:
  monitoring:
    name: monitoring-network
    driver: bridge

volumes:
  grafana_data:
    name: mon-grafana-data
  scom_dw_data:
    name: mon-scom-dw-data

services:

  # ---------------------------------------------------------------------------
  # Grafana -- SCOM Dashboards
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.5.2
    container_name: mon-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      # SCOM datasource only (no Prometheus/Loki datasources)
      - ../../configs/grafana/datasources/scom_dw.yml:/etc/grafana/provisioning/datasources/scom_dw.yml:ro
      # Dashboard provisioning -- SCOM folder only
      - ../../configs/grafana/dashboards/dashboards.scom.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      # SCOM dashboard JSON files
      - ../../dashboards/scom:/var/lib/grafana/dashboards/scom:ro
      # Persistent Grafana database
      - grafana_data:/var/lib/grafana
    environment:
      # Admin credentials -- change in production
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      # Security
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      # Disable telemetry
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      # Logging
      GF_LOG_MODE: "console file"
      GF_LOG_LEVEL: "info"
      GF_LOG_CONSOLE_FORMAT: "json"
      # SCOM Data Warehouse connection
      SCOM_DW_HOST: "${SCOM_DW_HOST:-scom-dw-sim}"
      SCOM_DW_PORT: "${SCOM_DW_PORT:-1433}"
      SCOM_DW_DATABASE: "${SCOM_DW_DATABASE:-OperationsManagerDW}"
      SCOM_DW_USER: "${SCOM_DW_USER:-svc-omread}"
      SCOM_DW_PASSWORD: "${SCOM_DW_PASSWORD:-ScomDemo123!}"
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # SCOM DW Simulator (demo/dev only -- not started in production)
  # ---------------------------------------------------------------------------
  scom-dw-sim:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: mon-scom-dw-sim
    restart: unless-stopped
    profiles:
      - scom-demo
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "ScomDemo123!"
    volumes:
      - scom_dw_data:/var/opt/mssql
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'ScomDemo123!' -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # SCOM DW Seed Runner (demo/dev only -- seeds simulator on first startup)
  # ---------------------------------------------------------------------------
  scom-dw-seed:
    build:
      context: ../../scripts
      dockerfile: Dockerfile.scom-seed
    container_name: mon-scom-dw-seed
    restart: "no"
    profiles:
      - scom-demo
    environment:
      SCOM_DW_HOST: scom-dw-sim
      SCOM_DW_PORT: "1433"
      SCOM_DW_SA_USER: sa
      SCOM_DW_SA_PASSWORD: "ScomDemo123!"
      SCOM_DW_WAIT_SECONDS: "120"
    depends_on:
      scom-dw-sim:
        condition: service_started
    networks:
      - monitoring
