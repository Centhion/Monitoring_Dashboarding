{{- if .Values.alertmanager.enabled }}
# ---------------------------------------------------------------------------
# Alertmanager Secret
# ---------------------------------------------------------------------------
# Stores notification channel credentials as environment variables.
# Alertmanager config references these via environment variable substitution.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "monitoring-stack.componentFullname" (dict "context" . "component" "alertmanager") }}-secret
  namespace: {{ include "monitoring-stack.namespace" . }}
  labels:
    {{- include "monitoring-stack.componentLabels" (dict "context" . "component" "alertmanager") | nindent 4 }}
type: Opaque
stringData:
  TEAMS_WEBHOOK_URL: {{ .Values.alertmanager.notifications.teamsWebhookUrl | quote }}
  SMTP_HOST: {{ .Values.alertmanager.notifications.smtp.host | quote }}
  SMTP_PORT: {{ .Values.alertmanager.notifications.smtp.port | quote }}
  SMTP_FROM: {{ .Values.alertmanager.notifications.smtp.from | quote }}
  ALERT_EMAIL_TO: {{ .Values.alertmanager.notifications.smtp.to | quote }}
{{- end }}
