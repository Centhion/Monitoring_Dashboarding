{{- if .Values.grafana.enabled }}
{{- if not .Values.grafana.admin.existingSecret }}
# ---------------------------------------------------------------------------
# Grafana Secret -- Admin Credentials
# ---------------------------------------------------------------------------
# Stores the initial admin username and password. Override at install time:
#   helm install monitoring ./deploy/helm/monitoring-stack \
#     --set grafana.admin.password=<secure-password>
#
# For production, consider using an existing secret:
#   --set grafana.admin.existingSecret=my-grafana-secret
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "monitoring-stack.componentFullname" (dict "context" . "component" "grafana") }}-secret
  namespace: {{ include "monitoring-stack.namespace" . }}
  labels:
    {{- include "monitoring-stack.componentLabels" (dict "context" . "component" "grafana") | nindent 4 }}
type: Opaque
stringData:
  admin-user: {{ .Values.grafana.admin.user | quote }}
  admin-password: {{ .Values.grafana.admin.password | quote }}
{{- end }}
{{- end }}
