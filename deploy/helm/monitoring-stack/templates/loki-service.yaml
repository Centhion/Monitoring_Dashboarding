{{- if .Values.loki.enabled }}
# ---------------------------------------------------------------------------
# Loki Service (ClusterIP)
# ---------------------------------------------------------------------------
# Exposes Loki HTTP push and query API within the cluster.
# Alloy agents push logs here. Grafana queries logs from here.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "monitoring-stack.componentFullname" (dict "context" . "component" "loki") }}
  namespace: {{ include "monitoring-stack.namespace" . }}
  labels:
    {{- include "monitoring-stack.componentLabels" (dict "context" . "component" "loki") | nindent 4 }}
spec:
  type: {{ .Values.loki.service.type }}
  ports:
    - port: {{ .Values.loki.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.loki.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    {{- include "monitoring-stack.selectorLabels" (dict "context" . "component" "loki") | nindent 4 }}
{{- end }}
