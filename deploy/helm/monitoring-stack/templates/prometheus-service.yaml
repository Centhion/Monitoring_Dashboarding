{{- if .Values.prometheus.enabled }}
# ---------------------------------------------------------------------------
# Prometheus Service (ClusterIP)
# ---------------------------------------------------------------------------
# Exposes Prometheus HTTP API within the cluster. Alloy agents send
# remote_write to this service endpoint. Grafana queries metrics from here.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "monitoring-stack.componentFullname" (dict "context" . "component" "prometheus") }}
  namespace: {{ include "monitoring-stack.namespace" . }}
  labels:
    {{- include "monitoring-stack.componentLabels" (dict "context" . "component" "prometheus") | nindent 4 }}
spec:
  type: {{ .Values.prometheus.service.type }}
  ports:
    - port: {{ .Values.prometheus.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "monitoring-stack.selectorLabels" (dict "context" . "component" "prometheus") | nindent 4 }}
{{- end }}
