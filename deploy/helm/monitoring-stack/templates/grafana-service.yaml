{{- if .Values.grafana.enabled }}
# ---------------------------------------------------------------------------
# Grafana Service (ClusterIP)
# ---------------------------------------------------------------------------
# Exposes Grafana web UI within the cluster. In Phase A, access via
# kubectl port-forward. Phase B adds Ingress for external access.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "monitoring-stack.componentFullname" (dict "context" . "component" "grafana") }}
  namespace: {{ include "monitoring-stack.namespace" . }}
  labels:
    {{- include "monitoring-stack.componentLabels" (dict "context" . "component" "grafana") | nindent 4 }}
spec:
  type: {{ .Values.grafana.service.type }}
  ports:
    - port: {{ .Values.grafana.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "monitoring-stack.selectorLabels" (dict "context" . "component" "grafana") | nindent 4 }}
{{- end }}
