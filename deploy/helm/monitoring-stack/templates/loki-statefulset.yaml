{{- if .Values.loki.enabled }}
# ---------------------------------------------------------------------------
# Loki StatefulSet
# ---------------------------------------------------------------------------
# Runs Loki in single-binary (monolithic) mode. Phase C may transition
# to distributed mode for higher throughput.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "monitoring-stack.componentFullname" (dict "context" . "component" "loki") }}
  namespace: {{ include "monitoring-stack.namespace" . }}
  labels:
    {{- include "monitoring-stack.componentLabels" (dict "context" . "component" "loki") | nindent 4 }}
spec:
  replicas: {{ .Values.loki.replicas }}
  serviceName: {{ include "monitoring-stack.componentFullname" (dict "context" . "component" "loki") }}
  selector:
    matchLabels:
      {{- include "monitoring-stack.selectorLabels" (dict "context" . "component" "loki") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "monitoring-stack.componentLabels" (dict "context" . "component" "loki") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/loki-configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Loki runs as uid 10001 by default
      securityContext:
        fsGroup: 10001
        runAsUser: 10001
        runAsNonRoot: true
      containers:
        - name: loki
          image: "{{ .Values.loki.image.repository }}:{{ .Values.loki.image.tag }}"
          imagePullPolicy: {{ .Values.loki.image.pullPolicy }}
          args:
            - "-config.file=/etc/loki/loki.yml"
          ports:
            - name: http
              containerPort: 3100
              protocol: TCP
            - name: grpc
              containerPort: 9096
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.loki.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/loki/loki.yml
              subPath: loki.yml
              readOnly: true
            - name: data
              mountPath: /loki
      volumes:
        - name: config
          configMap:
            name: {{ include "monitoring-stack.componentFullname" (dict "context" . "component" "loki") }}-config
  {{- if .Values.loki.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- toYaml .Values.loki.persistence.accessModes | nindent 10 }}
        {{- if .Values.loki.persistence.storageClass }}
        storageClassName: {{ .Values.loki.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.loki.persistence.size }}
  {{- else }}
      # No persistent storage -- logs lost on pod restart
        - name: data
          emptyDir: {}
  {{- end }}
{{- end }}
