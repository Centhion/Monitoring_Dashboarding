{{- if .Values.alertmanager.enabled }}
# ---------------------------------------------------------------------------
# Alertmanager Service (ClusterIP)
# ---------------------------------------------------------------------------
# Exposes Alertmanager HTTP API within the cluster.
# Prometheus sends alerts to this service endpoint.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "monitoring-stack.componentFullname" (dict "context" . "component" "alertmanager") }}
  namespace: {{ include "monitoring-stack.namespace" . }}
  labels:
    {{- include "monitoring-stack.componentLabels" (dict "context" . "component" "alertmanager") | nindent 4 }}
spec:
  type: {{ .Values.alertmanager.service.type }}
  ports:
    - port: {{ .Values.alertmanager.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "monitoring-stack.selectorLabels" (dict "context" . "component" "alertmanager") | nindent 4 }}
{{- end }}
