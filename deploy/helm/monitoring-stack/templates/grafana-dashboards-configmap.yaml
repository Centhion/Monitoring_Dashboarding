{{- if and .Values.grafana.enabled .Values.dashboards.enabled }}
# ---------------------------------------------------------------------------
# Grafana ConfigMap -- Dashboard JSON (Windows)
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "monitoring-stack.componentFullname" (dict "context" . "component" "grafana") }}-dashboards-windows
  namespace: {{ include "monitoring-stack.namespace" . }}
  labels:
    {{- include "monitoring-stack.componentLabels" (dict "context" . "component" "grafana") | nindent 4 }}
    grafana-dashboard: "windows"
data:
  {{- $windowsFiles := .Files.Glob "files/dashboards/windows/*.json" }}
  {{- range $path, $content := $windowsFiles }}
  {{ base $path }}: |-
    {{ $.Files.Get $path | nindent 4 }}
  {{- end }}
---
